<style>
/* Hero — nebula at low opacity, multiply-blended into parchment */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=80');
  background-size: cover;
  background-position: center 30%;
  opacity: 0.07;
  mix-blend-mode: multiply;
  pointer-events: none;
  z-index: 0;
}
.hero .shell { position: relative; z-index: 1; }
.hero .hero-glyph { z-index: 0; }

/* Philosophy — faint ancient paper texture */
#philosophy::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=1920&q=80');
  background-size: cover;
  background-position: center;
  opacity: 0.04;
  mix-blend-mode: multiply;
  pointer-events: none;
}
#philosophy .shell { position: relative; z-index: 1; }

/* Dark sections (Architecture + Closing) — deep-space starfield */
section.dark::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=1920&q=80');
  background-size: cover;
  background-position: center;
  opacity: 0.18;
  mix-blend-mode: screen;
  pointer-events: none;
}
section.dark .shell { position: relative; z-index: 1; }

#creator-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(11,18,32,.72);
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#creator-modal.open { display: flex; }
#creator-modal .modal-shell {
  width: 100%;
  max-width: 960px;
  height: min(90vh, 860px);
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  display: flex;

  box-shadow: 0 24px 80px rgba(0,0,0,.38);

#creator-modal .modal-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: #f5f4ef;
  border-bottom: 1px solid rgba(0,0,0,.08);
  flex-shrink: 0;
}
#creator-modal .modal-bar span {

  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(11,18,32,.55);
}
#creator-modal .modal-close {
  appearance: none;
  border: none;
  background: rgba(0,0,0,.07);
  border-radius: 6px;
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 14px;
  color: rgba(11,18,32,.6);
  display: flex; align-items: center; justify-content: center;
}
#creator-modal .modal-close:hover { background: rgba(0,0,0,.13); color: #0b1220; }

  flex: 1;
  border: none;
  width: 100%;
}

<div id="root"></div>

<!-- Creator modal -->
<div id="creator-modal" onclick="if(event.target===this)closeCreatorModal()">
  <div class="modal-shell">
    <div class="modal-bar">
      <span>Creator — Hwan Joo Jang</span>
      <button class="modal-close" onclick="closeCreatorModal()" aria-label="Close">✕</button>
    </div>
    <iframe id="creator-iframe" src="" title="Creator portfolio" loading="lazy"></iframe>
  </div>
</div>
<script>
function openCreatorModal() {
  var modal = document.getElementById('creator-modal');
  var iframe = document.getElementById('creator-iframe');
  if (!iframe.src || iframe.src === window.location.href) {
    iframe.src = 'creator.html';
  }
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCreatorModal() {
  document.getElementById('creator-modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeCreatorModal();
});
</script>

// ─────────────────────────────────────────────────────────────────────────────

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>

<script type="text/babel">
/* global React */
const { useEffect, useRef, useState } = React;

// ---------- Hooks: reveal on scroll ----------
function useReveal(threshold = 0.18) {
  const ref = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!ref.current || seen) return;
    const el = ref.current;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          setSeen(true);
          io.disconnect();
        }
      });
    }, { threshold, rootMargin: "0px 0px -10% 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, [seen, threshold]);
  return [ref, seen];
}

// ---------- Reveal wrapper ----------
function Reveal({ children, className = "", delay = 0, as: Tag = "div", ...rest }) {
  const [ref, seen] = useReveal();
  const cls = ["fade", `d${delay}`, seen ? "in" : "", className].filter(Boolean).join(" ");
  return <Tag ref={ref} className={cls} {...rest}>{children}</Tag>;
}

// ---------- Hairline that draws in on view ----------
function DrawRule({ className = "", color = "rule" }) {
  const [ref, seen] = useReveal(0.5);
  return (
    <hr
      ref={ref}
      className={["hairline", color === "dark" ? "dark" : "", "draw-rule", seen ? "in" : "", className].join(" ")}
    />
  );
}

// ---------- Tick number that animates from 0 to value ----------
function Tick({ to, format = (n) => n.toLocaleString(), duration = 1400, suffix = "", prefix = "" }) {
  const [ref, seen] = useReveal(0.4);
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!seen) return;
    let raf;
    const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / duration);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(eased * to));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [seen, to, duration]);
  return <span ref={ref} className="tick">{prefix}{format(val)}{suffix}</span>;
}

            <Reveal as="div" className="glyph" delay={1} style={{
              fontSize: "clamp(120px, 14vw, 220px)",
              color: "var(--terracotta-2)",
              fontStyle: "italic",
            }}>
              ω
            </Reveal>
            <div style={{ height: 12 }} />
            <Reveal as="p" className="body" delay={2} style={{ color: "rgba(241,234,216,.6)", maxWidth: "30ch", fontSize: 14 }}>
              Each system in Noēsis takes its name from a Greek concept. The terms are not decoration —
              they specify intent.
            </Reveal>
          </div>
          <div>
            <Reveal>
              <table className="etym">
                <thead>
                  <tr>
                    <th style={{ width: "20%" }}>Term</th>
                    <th style={{ width: "20%" }}>Greek</th>
                    <th>Meaning in Noēsis</th>
                  </tr>
                </thead>
                <tbody>
                  {ETYM.map(([term, greek, meaning]) => (
                    <tr key={term}>
                      <td>{term}</td>
                      <td>{greek}</td>
                      <td>{meaning}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </Reveal>
          </div>
        </div>

        <div style={{ height: 96 }} />
        <Reveal as="p" className="closing-display" delay={1} style={{ textAlign: "center", color: "var(--parchment)" }}>
          A world not of atoms, <span className="answer">but of minds.</span>
        </Reveal>
        <div style={{ height: 96 }} />

        <div className="footer">
          <span>Noēsis · 2026</span>
          <span>Open-source · MIT</span>
          <span style={{display:"flex",gap:24}}>
            <a href="https://github.com/ASKKPOP/Noesis" target="_blank" rel="noopener" style={{color:"inherit",textDecoration:"none",letterSpacing:"0.14em"}}>GitHub</a>
            <a href="creator.html" style={{color:"inherit",textDecoration:"none",letterSpacing:"0.14em"}}>askkpop.com</a>
          </span>
        </div>
      </div>
    </section>
  );
}

window.Architecture = Architecture;
window.Closing = Closing;
</script>
<script type="text/babel">
/* global React, ReactDOM, useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakSlider, TweakToggle */
/* global TopNav, Hero, Philosophy, Pillars, Architecture, Closing */

const { useEffect: useAppEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "aegean",
  "density": "default",
  "greek": "core",
  "showTweaks": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useAppEffect(() => {
    const b = document.body;
    b.dataset.palette = tweaks.palette === "aegean" ? "" : tweaks.palette;
    b.dataset.density = tweaks.density === "default" ? "" : tweaks.density;
    b.dataset.greek = tweaks.greek === "core" ? "" : tweaks.greek;
  }, [tweaks]);

  return (
    <>
      <TopNav />
      <main>
        <Hero />
        <Philosophy />
        <Pillars />
        <Architecture />
        <Closing />
      </main>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Palette">
          <TweakRadio
            label="Theme"
            value={tweaks.palette}
            onChange={(v) => setTweak("palette", v)}
            options={[
              { value: "aegean", label: "Aegean" },
              { value: "ink", label: "Ink" },
              { value: "marble", label: "Marble" },
            ]}
          />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakRadio
            label="Density"
            value={tweaks.density}
            onChange={(v) => setTweak("density", v)}
            options={[
              { value: "tight", label: "Tight" },
              { value: "default", label: "Default" },
              { value: "airy", label: "Airy" },
            ]}
          />
          <TweakRadio
            label="Greek prominence"
            value={tweaks.greek}
            onChange={(v) => setTweak("greek", v)}
            options={[
              { value: "subtle", label: "Subtle" },
              { value: "core", label: "Core" },
              { value: "bold", label: "Bold" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body></html>
